name: Feature request
description: Propose a specific user outcome or bounded improvement.
title: "[Feature]: "
labels: ["enhancement", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: Large experience concepts are usually better in Discussions first. This form works best when the problem and acceptance criteria are already concrete.

  - type: textarea
    id: problem
    attributes:
      label: Problem or user outcome
      description: What becomes easier, safer, clearer, or more accessible?
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Product area
      multiple: true
      options:
        - Edge lighting
        - Completion island
        - Settings or calibration
        - Integration
        - Accessibility
        - Packaging or releases
        - Documentation
    validations:
      required: true

  - type: textarea
    id: experience
    attributes:
      label: Proposed experience
      description: Describe behavior and states, not only implementation.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives or current workaround

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      placeholder: |
        - [ ] ...
        - [ ] ...
    validations:
      required: true

  - type: textarea
    id: constraints
    attributes:
      label: Accessibility and resource implications
      description: Consider keyboard/screen-reader behavior, reduced motion, contrast, memory, CPU, and multi-monitor/DPI effects.
    validations:
      required: true

  - type: dropdown
    id: participation
    attributes:
      label: Can you help implement or test it?
      options:
        - I can implement it
        - I can test it
        - I can provide design or documentation help
        - I am reporting the need only
    validations:
      required: true

