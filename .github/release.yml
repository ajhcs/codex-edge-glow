changelog:
  exclude:
    labels:
      - skip-changelog
  categories:
    - title: Added
      labels:
        - feature
        - enhancement
    - title: Improved
      labels:
        - performance
        - accessibility
        - design
    - title: Fixed
      labels:
        - bug
    - title: Documentation
      labels:
        - documentation
    - title: Other changes
      labels:
        - "*"

